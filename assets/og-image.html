<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;font-family:Inter,sans-serif;
    background:#09090b;background-image:radial-gradient(70% 60% at 50% 0%,rgba(201,162,75,.16),transparent 60%);
    color:#f6f2e9;display:flex;align-items:center;justify-content:center;text-align:center}
  .frame{position:absolute;inset:34px;border:1px solid rgba(201,162,75,.4)}
  .c{position:absolute;width:24px;height:24px;border:3px solid #c9a24b}
  .tl{top:34px;left:34px;border-right:0;border-bottom:0}.tr{top:34px;right:34px;border-left:0;border-bottom:0}
  .bl{bottom:34px;left:34px;border-right:0;border-top:0}.br{bottom:34px;right:34px;border-left:0;border-top:0}
  .inner{position:relative;z-index:1}
  .kick{font-size:18px;letter-spacing:.45em;text-transform:uppercase;color:#8b8576}
  .name{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:104px;letter-spacing:4px;line-height:1;margin-top:8px;
    background:linear-gradient(180deg,#ead29a,#c9a24b 55%,#9c7c2e);-webkit-background-clip:text;background-clip:text;color:transparent}
  .title{font-size:24px;letter-spacing:.4em;text-transform:uppercase;color:#ead29a;margin-top:22px}
  .rule{width:280px;height:1px;background:linear-gradient(90deg,transparent,#c9a24b,transparent);margin:30px auto}
  .line{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:30px;color:#cbc4b6}
  .disc{margin-top:30px;font-size:15px;letter-spacing:.25em;text-transform:uppercase;color:#cbc4b6}
  .disc b{color:#c9a24b;font-weight:400;margin:0 10px}
</style></head>
<body>
  <div class="frame"></div><span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
  <div class="inner">
    <img src="logo-z.svg" width="96" height="96" style="display:block;margin:0 auto 16px">
    <div class="kick">⚜ &nbsp; SrChZ Technologies &nbsp; ⚜</div>
    <div class="name">RAFAEL CORDEIRO</div>
    <div class="title">Growth &amp; Branding Strategist</div>
    <div class="rule"></div>
    <div class="line">Transformo marcas em ativos lucráveis.</div>
    <div class="disc">Web Dev <b>·</b> Meta Ads <b>·</b> Branding <b>·</b> Visual Maker <b>·</b> Portal &amp; Dados</div>
  </div>
</body></html>
