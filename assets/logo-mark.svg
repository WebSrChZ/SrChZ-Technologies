<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="SrChZ Technologies">
  <defs>
    <linearGradient id="zg" x1="48" y1="48" x2="152" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f2dca8"/>
      <stop offset=".5" stop-color="#c9a24b"/>
      <stop offset="1" stop-color="#8f6f28"/>
    </linearGradient>
  </defs>

  <!-- crest -->
  <circle cx="100" cy="100" r="95" stroke="#c9a24b" stroke-width="1.4"/>
  <circle cx="100" cy="100" r="87" stroke="#c9a24b" stroke-width="0.7" stroke-opacity=".4"/>
  <circle cx="100" cy="6"  r="2.1" fill="#c9a24b"/>
  <circle cx="100" cy="194" r="2.1" fill="#c9a24b"/>
  <circle cx="6"  cy="100" r="2.1" fill="#c9a24b"/>
  <circle cx="194" cy="100" r="2.1" fill="#c9a24b"/>

  <!-- Z backbone: the 5th letter + the path that orders the name (gradient = start→end) -->
  <path d="M58 64 H142 L58 136 H142" stroke="url(#zg)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- name initials at the Z's nodes — trace the Z: R · H · C · S · (Z) -->
  <g font-family="Cormorant Garamond, Georgia, serif" font-weight="700" fill="#fdf6e3">
    <text x="44"  y="56"  font-size="23" text-anchor="middle">R</text>
    <text x="156" y="56"  font-size="23" text-anchor="middle">H</text>
    <text x="133" y="93"  font-size="20" text-anchor="middle">C</text>
    <text x="63"  y="123" font-size="20" text-anchor="middle">S</text>
  </g>
</svg>
